<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AGMUN</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="text-align: center; justify-content: center; min-height: 80vh;">
        <header class="header">
            <h1 class="title" style="font-size: 5rem; margin-bottom: 0; line-height: 1;">404</h1>
            <p class="description" style="font-size: 1.25rem; margin-top: 1rem; color: var(--text-primary);">
                Oops! Looks like this page went off the agenda.
            </p>
            <p class="description" style="margin-top: 0.5rem;">
                The link you followed may be broken, or the page may have been removed.
            </p>
        </header>

        <main class="links-container" style="margin-top: 2rem;">
            <a href="/" class="link-button primary" style="justify-content: center;">
                <span class="button-text">Return to Home</span>
            </a>
        </main>
    </div>
</body>
</html>
