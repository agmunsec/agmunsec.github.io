<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AGMUN (Alor Gajah Model United Nations) is a club in UiTM Alor Gajah focusing on mock parliamentary debates and public speaking.">
    <title>AGMUN - Alor Gajah Model United Nations</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated background mesh -->
    <div class="background-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div class="container glass-panel">
        <header class="header">
            <div class="profile-image">
                <img src="logo.png" alt="AGMUN Logo">
            </div>
            <h1 class="title">@agmunsec</h1>
            <p class="description">
                Alor Gajah Model United Nations 🏛️<br>Debates • Training • Conferences
            </p>
        </header>

        <main>
            <nav class="links-container" aria-label="Important Links">
                <a href="https://instagram.com/agmunclub" target="_blank" rel="noopener noreferrer" class="link-button primary">
                    <svg class="button-icon-left" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    <span class="button-text">Instagram @agmunclub</span>
                    <span class="button-icon-right">→</span>
                </a>
                <a href="https://tiktok.com/@agmunclub" target="_blank" rel="noopener noreferrer" class="link-button">
                    <svg class="button-icon-left" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    <span class="button-text">TikTok @agmunclub</span>
                    <span class="button-icon-right">→</span>
                </a>
            </nav>
        </main>

        <footer class="footer">
            <p>&copy; Alor Gajah Model United Nations 2026, Ahmad Irfan</p>
        </footer>
    </div>
</body>
</html>
